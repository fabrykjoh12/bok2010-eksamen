<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>BØK2010 — Eksamenstrening V2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: linear-gradient(135deg, #0f1117 0%, #1a1f2e 100%);
  color: #e8eaf0;
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 900px; margin: 0 auto; }

header {
  text-align: center;
  margin-bottom: 24px;
  padding: 20px;
  background: rgba(126, 200, 227, 0.1);
  border-radius: 16px;
  border: 1px solid rgba(126, 200, 227, 0.3);
}
h1 { color: #7ec8e3; font-size: 1.6em; margin-bottom: 6px; }
.subtitle { color: #a0a8b8; font-size: 0.9em; }

/* MAIN MODE SELECTOR */
.mode-selector {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}
@media (max-width: 600px) { .mode-selector { grid-template-columns: 1fr; } }
.mode-btn {
  padding: 18px;
  background: #1e2130;
  color: #e8eaf0;
  border: 2px solid #2a2f42;
  border-radius: 12px;
  cursor: pointer;
  font-size: 0.9em;
  font-weight: 600;
  transition: all 0.2s;
  text-align: left;
}
.mode-btn:hover {
  background: #252a3a;
  border-color: #7ec8e3;
  transform: translateY(-2px);
}
.mode-btn.active {
  background: linear-gradient(135deg, #7ec8e3 0%, #6bb5d0 100%);
  color: #0f1117;
  border-color: #7ec8e3;
}
.mode-btn-icon { font-size: 1.6em; display: block; margin-bottom: 6px; }
.mode-btn-title { font-size: 1.05em; margin-bottom: 4px; }
.mode-btn-desc { font-size: 0.78em; opacity: 0.85; font-weight: 400; }

/* START SCREEN */
.start-screen {
  background: #1e2130;
  padding: 30px;
  border-radius: 14px;
  text-align: center;
}
.start-screen.hidden { display: none; }
.start-screen h2 { color: #7ec8e3; margin-bottom: 12px; }
.start-screen p { color: #c0c8d8; line-height: 1.6; margin-bottom: 8px; font-size: 0.92em; }
.start-info {
  background: #252a3a;
  border-radius: 10px;
  padding: 16px;
  margin: 20px 0;
  text-align: left;
}
.start-info-item {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: 0.88em;
}
.start-info-item span:first-child { color: #a0a8b8; }
.start-info-item span:last-child { color: #7ec8e3; font-weight: 600; }

.btn-start {
  background: linear-gradient(135deg, #6bff9e 0%, #7ec8e3 100%);
  color: #0f1117;
  padding: 14px 30px;
  border: none;
  border-radius: 10px;
  font-size: 1em;
  font-weight: 700;
  cursor: pointer;
  margin-top: 14px;
  transition: transform 0.2s;
}
.btn-start:hover { transform: scale(1.04); }

/* QUIZ AREA */
.quiz-area { display: none; }
.quiz-area.active { display: block; }

.progress-container {
  background: #1e2130;
  padding: 14px 18px;
  border-radius: 12px;
  margin-bottom: 20px;
  position: sticky;
  top: 10px;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 0.85em;
  color: #c0c8d8;
  margin-bottom: 8px;
  flex-wrap: wrap;
  gap: 6px;
}
.progress-bar-bg {
  height: 8px;
  background: #2a2f42;
  border-radius: 4px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #7ec8e3 0%, #6bff9e 100%);
  border-radius: 4px;
  transition: width 0.4s;
  width: 0%;
}

.timer {
  display: inline-block;
  background: #ffd16622;
  color: #ffd166;
  padding: 4px 10px;
  border-radius: 6px;
  font-weight: 700;
  font-family: monospace;
}

.question {
  background: #1e2130;
  border-radius: 14px;
  padding: 22px;
  margin-bottom: 18px;
  border-left: 4px solid #7ec8e3;
  display: none;
  animation: fadeIn 0.3s;
}
.question.visible { display: block; }
.question.theory { border-left-color: #c77dff; }
.question.math { border-left-color: #ffd166; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.q-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
  gap: 8px;
}
.q-num {
  background: #7ec8e322;
  color: #7ec8e3;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 0.75em;
  font-weight: 700;
}
.q-cat {
  background: #c77dff22;
  color: #c77dff;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 0.72em;
  font-weight: 600;
}
.q-weight {
  background: #ffd16622;
  color: #ffd166;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 0.72em;
  font-weight: 600;
}
.q-difficulty {
  font-size: 0.72em;
  padding: 3px 8px;
  border-radius: 6px;
  font-weight: 600;
}
.q-difficulty.easy { background: #6bff9e22; color: #6bff9e; }
.q-difficulty.medium { background: #ffd16622; color: #ffd166; }
.q-difficulty.hard { background: #ff6b6b22; color: #ff6b6b; }

.q-text {
  font-size: 0.95em;
  line-height: 1.6;
  color: #e8eaf0;
  margin-bottom: 14px;
  white-space: pre-wrap;
}
.q-text strong { color: #ffd166; }

.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 10px;
}
.option {
  background: #252a3a;
  border: 2px solid transparent;
  border-radius: 10px;
  padding: 12px 16px;
  cursor: pointer;
  color: #c0c8d8;
  font-size: 0.88em;
  transition: all 0.2s;
  text-align: left;
  line-height: 1.5;
}
.option:hover { border-color: #7ec8e3; background: #2a3045; }
.option.selected { background: #7ec8e322; border-color: #7ec8e3; color: #fff; }
.option.correct { background: #6bff9e22; border-color: #6bff9e; color: #6bff9e; }
.option.incorrect { background: #ff6b6b22; border-color: #ff6b6b; color: #ff6b6b; }

.text-input {
  width: 100%;
  background: #252a3a;
  border: 2px solid #3a3f52;
  border-radius: 10px;
  padding: 12px 16px;
  color: #fff;
  font-size: 0.9em;
  font-family: inherit;
  margin-top: 8px;
  transition: border-color 0.2s;
}
.text-input:focus { outline: none; border-color: #7ec8e3; }
textarea.text-input { min-height: 120px; resize: vertical; }

.q-actions {
  display: flex;
  gap: 10px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.btn {
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  font-size: 0.85em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary {
  background: #7ec8e3;
  color: #0f1117;
}
.btn-primary:hover { background: #5fb3d3; }
.btn-secondary {
  background: #2a2f42;
  color: #c0c8d8;
}
.btn-secondary:hover { background: #3a3f52; }
.btn-show {
  background: #ffd16622;
  color: #ffd166;
  border: 1px solid #ffd16655;
}
.btn-show:hover { background: #ffd16633; }

.feedback {
  margin-top: 14px;
  padding: 14px;
  border-radius: 8px;
  font-size: 0.85em;
  line-height: 1.6;
  display: none;
}
.feedback.show { display: block; animation: fadeIn 0.3s; }
.feedback.correct {
  background: #6bff9e15;
  border-left: 3px solid #6bff9e;
  color: #c8ffe0;
}
.feedback.incorrect {
  background: #ff6b6b15;
  border-left: 3px solid #ff6b6b;
  color: #ffd0d0;
}
.feedback.info {
  background: #7ec8e315;
  border-left: 3px solid #7ec8e3;
  color: #d0e8f5;
}
.feedback strong { color: #fff; }
.feedback .answer-key {
  background: #252a3a;
  padding: 8px 12px;
  border-radius: 6px;
  margin-top: 8px;
  font-family: monospace;
  color: #ffd166;
  white-space: pre-wrap;
  font-size: 0.85em;
}

.nav-buttons {
  display: flex;
  justify-content: space-between;
  margin: 20px 0;
  gap: 10px;
}
.nav-btn {
  flex: 1;
  padding: 14px;
  background: #1e2130;
  color: #e8eaf0;
  border: 2px solid #2a2f42;
  border-radius: 10px;
  cursor: pointer;
  font-size: 0.9em;
  font-weight: 600;
  transition: all 0.2s;
}
.nav-btn:hover:not(:disabled) {
  background: #7ec8e3;
  color: #0f1117;
  border-color: #7ec8e3;
}
.nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.summary {
  background: #1e2130;
  border-radius: 14px;
  padding: 30px;
  text-align: center;
  display: none;
}
.summary.visible { display: block; }
.summary h2 { color: #7ec8e3; margin-bottom: 14px; }
.score-circle {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  margin: 20px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.4em;
  font-weight: 700;
  border: 8px solid #7ec8e3;
  color: #7ec8e3;
}
.grade-display {
  font-size: 2.5em;
  font-weight: 700;
  margin: 14px 0;
}

.hint {
  color: #a0a8b8;
  font-style: italic;
  font-size: 0.82em;
  margin-top: 6px;
}

.formula-hint {
  background: #252a3a;
  border-radius: 6px;
  padding: 10px 14px;
  margin: 10px 0;
  font-family: monospace;
  color: #ffd166;
  font-size: 0.85em;
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>📝 BØK2010 — Eksamenstrening V2026</h1>
    <p class="subtitle">Velg modus for å starte treningen</p>
  </header>

  <div class="mode-selector">
    <button class="mode-btn" onclick="selectMode('theory')" id="mode-theory">
      <span class="mode-btn-icon">📚</span>
      <div class="mode-btn-title">Teori & Begreper</div>
      <div class="mode-btn-desc">35 spørsmål · Definisjoner, sant/usant, MC · Hurtig repetisjon</div>
    </button>
    <button class="mode-btn" onclick="selectMode('math')" id="mode-math">
      <span class="mode-btn-icon">🧮</span>
      <div class="mode-btn-title">Matematikk & Regning</div>
      <div class="mode-btn-desc">30 oppgaver · EOQ, sensitivitet, prognoser · Trenger papir og kalkulator</div>
    </button>
    <button class="mode-btn" onclick="selectMode('full')" id="mode-full">
      <span class="mode-btn-icon">🎯</span>
      <div class="mode-btn-title">Full eksamen</div>
      <div class="mode-btn-desc">Blandet utvalg · Som en ekte eksamen · 4 timer</div>
    </button>
  </div>

  <!-- START SCREEN -->
  <div class="start-screen" id="start-screen">
    <h2 id="start-title">Velg en modus over for å starte</h2>
    <p id="start-desc">Hver modus tester forskjellige aspekter av faget.</p>
    
    <div class="start-info" id="start-info" style="display:none">
      <div class="start-info-item">
        <span>Antall oppgaver:</span>
        <span id="info-count">-</span>
      </div>
      <div class="start-info-item">
        <span>Total poengsum:</span>
        <span id="info-points">-</span>
      </div>
      <div class="start-info-item">
        <span>Anbefalt tid:</span>
        <span id="info-time">-</span>
      </div>
      <div class="start-info-item">
        <span>Vanskelighet:</span>
        <span id="info-difficulty">-</span>
      </div>
    </div>
    
    <button class="btn-start" id="start-btn" onclick="startQuiz()" style="display:none">▶️ Start trening</button>
  </div>

  <!-- QUIZ AREA -->
  <div class="quiz-area" id="quiz-area">
    <div class="progress-container">
      <div class="progress-info">
        <span>Spørsmål <span id="current-q">1</span>/<span id="total-q">25</span></span>
        <span class="timer" id="timer">00:00</span>
        <span>Poeng: <span id="score">0</span>/<span id="max-score">100</span></span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
    </div>

    <div id="questions-container"></div>

    <div class="nav-buttons">
      <button class="nav-btn" id="prev-btn" onclick="navigate(-1)" disabled>← Forrige</button>
      <button class="nav-btn" id="next-btn" onclick="navigate(1)">Neste →</button>
    </div>
  </div>

  <div class="summary" id="summary">
    <h2>🎯 Trening fullført</h2>
    <div class="score-circle" id="final-score">0%</div>
    <div class="grade-display" id="final-grade">-</div>
    <p id="summary-text" style="margin: 14px 0; color: #c0c8d8; line-height: 1.6;"></p>
    <p id="time-used" style="color: #a0a8b8; margin: 10px 0;"></p>
    <div style="display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap">
      <button class="btn btn-primary" onclick="restart()">🔄 Start på nytt</button>
      <button class="btn btn-secondary" onclick="backToMenu()">📋 Tilbake til meny</button>
    </div>
  </div>
</div>

<script>
// ========== THEORY QUESTIONS (35) ==========
const theoryQuestions = [
  {
    cat: "Intro/Begreper",
    weight: "MC",
    points: 2,
    difficulty: "easy",
    text: "Hvilket av følgende uttrykker tilgang på ressurser i en matematisk modell?",
    type: "mc",
    options: ["En beslutningsvariabel", "En målfunksjon", "En begrensning (restriksjon)", "En parameter"],
    correct: 2,
    explanation: "En begrensning (restriksjon) uttrykker tilgang på ressurser. Beslutningsvariabler er det vi bestemmer, målfunksjonen er det vi maks/min'er, og parametere er konstanter i modellen."
  },
  {
    cat: "Intro/Begreper",
    weight: "MC",
    points: 2,
    difficulty: "easy",
    text: "Hva beskriver beslutningsvariabler best?",
    type: "mc",
    options: [
      "De måler verdien av målfunksjonen",
      "De angir hvor mye/hvor mange enheter som skal produseres, kjøpes, ansettes osv.",
      "De finnes alltid én per begrensning",
      "De måler hvor mye av hver ressurs som er igjen"
    ],
    correct: 1,
    explanation: "Beslutningsvariabler representerer mengden av noe som skal bestemmes — typisk antall enheter produsert eller kjøpt."
  },
  {
    cat: "Intro/Begreper",
    weight: "MC",
    points: 2,
    difficulty: "easy",
    text: "Sant eller usant: En typisk målfunksjon kan skrives som '3S + 2R + 5Z ≤ 20'",
    type: "mc",
    options: ["Sant", "Usant"],
    correct: 1,
    explanation: "USANT. Målfunksjoner inneholder IKKE ulikhetstegn (≤, ≥). En målfunksjon er noe som maksimeres eller minimeres, f.eks. 'MAX Z = 3S + 2R + 5Z'. Uttrykk med ≤ er restriksjoner."
  },
  {
    cat: "Break-even",
    weight: "MC",
    points: 2,
    difficulty: "easy",
    text: "Hvis pris øker (mens variable og faste kostnader holdes konstante), hva skjer med break-even?",
    type: "mc",
    options: ["Det øker", "Det reduseres", "Det forblir uendret", "Det blir negativt"],
    correct: 1,
    explanation: "Break-even = FC / (Pris - VUC). Når pris øker, øker nevneren (dekningsbidraget) → break-even reduseres."
  },
  {
    cat: "Break-even",
    weight: "MC",
    points: 2,
    difficulty: "easy",
    text: "Hvis variable kostnader øker, men pris og faste kostnader holdes konstante, hva skjer med break-even?",
    type: "mc",
    options: ["Det reduseres", "Det øker", "Det forblir uendret", "Det blir umulig å beregne"],
    correct: 1,
    explanation: "Når VUC øker, blir dekningsbidraget (P - VUC) mindre → break-even øker."
  },
  {
    cat: "LP-teori",
    weight: "MC",
    points: 3,
    difficulty: "medium",
    text: "Hvilket av disse er IKKE en uregelmessig type LP-problem?",
    type: "mc",
    options: [
      "Flere optimale løsninger",
      "Ingen gjennomførbar løsning",
      "Ubegrenset løsning",
      "Negativ skyggepris"
    ],
    correct: 3,
    explanation: "De tre uregelmessige typene er: flere optimale løsninger (parallell målfunksjon), ingen gjennomførbar løsning (motstridende restriksjoner), og ubegrenset løsning (åpent mulighetsområde). Negativ skyggepris finnes ikke i standard max-problemer med ≤-restriksjoner."
  },
  {
    cat: "LP-teori",
    weight: "MC",
    points: 3,
    difficulty: "medium",
    text: "Hvor i mulighetsområdet ligger en optimal LP-løsning?",
    type: "mc",
    options: [
      "I sentrum av mulighetsområdet",
      "Tilfeldig hvor som helst i mulighetsområdet",
      "Alltid i et hjørnepunkt (eller langs en kant ved flere optimale løsninger)",
      "Langs målfunksjonens skjæring med y-aksen"
    ],
    correct: 2,
    explanation: "Hovedteorem i LP: optimal løsning ligger alltid i et hjørnepunkt av mulighetsområdet. Ved 'flere optimale løsninger' kan hele kanten mellom to hjørnepunkter være optimal."
  },
  {
    cat: "LP-teori",
    weight: "MC",
    points: 3,
    difficulty: "medium",
    text: "Hva betyr 'slakk' i en LP-løsning?",
    type: "mc",
    options: [
      "Hvor mye av en ressurs som er brukt",
      "Hvor mye av en ressurs som er ubrukt — forskjell mellom høyre side og forbruk",
      "Et mål på løsningens nøyaktighet",
      "Hvor mye målfunksjonen kan endres"
    ],
    correct: 1,
    explanation: "Slakk = ubrukt kapasitet av en ressurs. Slakk = 0 betyr at restriksjonen er bindende (fullt utnyttet). Slakk > 0 betyr at restriksjonen ikke er bindende."
  },
  {
    cat: "LP-sensitivitet",
    weight: "MC",
    points: 3,
    difficulty: "medium",
    text: "En restriksjon har Slakk = 15 og Skyggepris = 0. Hva betyr dette?",
    type: "mc",
    options: [
      "Restriksjonen er bindende",
      "Restriksjonen er ikke bindende — vi har 15 enheter ubrukt kapasitet, og ekstra kapasitet gir ingen verdi",
      "Vi har brukt 15 enheter for mye",
      "Restriksjonen er feilformulert"
    ],
    correct: 1,
    explanation: "Ikke-bindende restriksjon (slakk > 0) har alltid skyggepris = 0. Vi har allerede 15 enheter til overs, så å øke kapasiteten gir ingen ekstra verdi."
  },
  {
    cat: "LP-sensitivitet",
    weight: "MC",
    points: 3,
    difficulty: "medium",
    text: "Hva er en skyggepris (shadow price)?",
    type: "mc",
    options: [
      "Prisen på reservetimer i produksjonen",
      "Marginal endring i målfunksjonen for én ekstra enhet på høyre side av en bindende restriksjon",
      "Forventet pris i fremtiden",
      "Forskjellen mellom maks og min løsninger"
    ],
    correct: 1,
    explanation: "Skyggepris forteller hvor mye Z (målfunksjonen) endres hvis vi øker høyre side av en bindende restriksjon med én enhet. Gjelder kun innenfor sensitivitetsintervallet."
  },
  {
    cat: "LP-sensitivitet",
    weight: "MC",
    points: 3,
    difficulty: "medium",
    text: "Hva er 'redusert kostnad' for en variabel x₁ med verdi 0 i optimal løsning?",
    type: "mc",
    options: [
      "Hvor mye målfunksjonskoeffisienten må endres før x₁ blir lønnsom å produsere",
      "Kostnaden ved å produsere x₁",
      "Profittmarginen for x₁",
      "Antall x₁ vi bør lage"
    ],
    correct: 0,
    explanation: "Redusert kostnad er forbedringen i målfunksjonskoeffisienten som trengs for at variabelen skal være lønnsom å inkludere i optimal løsning. Hvis x₁ allerede er > 0 i optimum, er redusert kostnad = 0."
  },
  {
    cat: "LP-sensitivitet",
    weight: "MC",
    points: 3,
    difficulty: "hard",
    text: "Sensitivitetsintervallet for en målfunksjonskoeffisient forteller deg...",
    type: "mc",
    options: [
      "Innenfor hvilket område Z (profitten) ikke endrer seg",
      "Innenfor hvilket område den optimale LØSNINGEN (x-verdiene) ikke endrer seg, selv om Z endrer seg",
      "Hvor mye en restriksjon kan endres",
      "Hvor sterk modellen er"
    ],
    correct: 1,
    explanation: "Sensitivitetsintervallet for koeffisienten i målfunksjonen sier hvor mye koeffisienten kan variere uten at x-verdiene endrer seg. Z (totalprofitten) vil derimot endre seg lineært med koeffisienten."
  },
  {
    cat: "Transport",
    weight: "MC",
    points: 3,

// ========== STATE ==========
let currentQuestions = [];
let currentQ = 0;
let answers = {};
let totalScore = 0;
let maxPossibleScore = 0;
let startTime;
let timerInterval;
let selectedMode = null;

const modeInfo = {
  theory: { 
    title: "📚 Teori & Begreper", 
    desc: "35 spørsmål om definisjoner, sant/usant, og konseptuelle valg.",
    time: "30-45 min",
    difficulty: "Lett-medium"
  },
  math: { 
    title: "🧮 Matematikk & Regning", 
    desc: "30 oppgaver med tallsvar. Trenger papir og kalkulator.",
    time: "60-90 min",
    difficulty: "Medium-vanskelig"
  },
  full: { 
    title: "🎯 Full eksamen", 
    desc: "Blandet utvalg av 25 oppgaver — som en ekte eksamen.",
    time: "3-4 timer",
    difficulty: "Variert"
  }
};

function selectMode(mode) {
  selectedMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-' + mode).classList.add('active');
  
  const info = modeInfo[mode];
  document.getElementById('start-title').textContent = info.title;
  document.getElementById('start-desc').textContent = info.desc;
  
  let count, points;
  if (mode === 'theory') { count = theoryQuestions.length; points = theoryQuestions.reduce((s,q)=>s+q.points,0); }
  else if (mode === 'math') { count = mathQuestions.length; points = mathQuestions.reduce((s,q)=>s+q.points,0); }
  else { 
    count = 25; 
    const mixed = getFullExamMix();
    points = mixed.reduce((s,q)=>s+q.points,0);
  }
  
  document.getElementById('info-count').textContent = count;
  document.getElementById('info-points').textContent = points;
  document.getElementById('info-time').textContent = info.time;
  document.getElementById('info-difficulty').textContent = info.difficulty;
  
  document.getElementById('start-info').style.display = 'block';
  document.getElementById('start-btn').style.display = 'inline-block';
}

function getFullExamMix() {
  // Realistic exam mix: ~10 theory + ~15 math
  const theorySample = shuffleArray([...theoryQuestions]).slice(0, 10);
  const mathSample = shuffleArray([...mathQuestions]).slice(0, 15);
  return shuffleArray([...theorySample, ...mathSample]);
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  if (selectedMode === 'theory') currentQuestions = [...theoryQuestions];
  else if (selectedMode === 'math') currentQuestions = [...mathQuestions];
  else currentQuestions = getFullExamMix();
  
  maxPossibleScore = currentQuestions.reduce((s,q)=>s+q.points,0);
  currentQ = 0;
  answers = {};
  totalScore = 0;
  startTime = Date.now();
  
  document.getElementById('start-screen').classList.add('hidden');
  document.querySelector('.mode-selector').style.display = 'none';
  document.getElementById('quiz-area').classList.add('active');
  
  document.getElementById('total-q').textContent = currentQuestions.length;
  document.getElementById('max-score').textContent = maxPossibleScore;
  
  renderQuestions();
  showQuestion(0);
  startTimer();
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;
    document.getElementById('timer').textContent = 
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

function renderQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = currentQuestions.map((q, idx) => {
    let inputHtml = '';
    if (q.type === 'mc') {
      inputHtml = `<div class="options">
        ${q.options.map((opt, i) => 
          `<button class="option" onclick="selectOption(${idx}, ${i})" id="opt-${idx}-${i}">${opt}</button>`
        ).join('')}
      </div>`;
    } else if (q.type === 'number') {
      inputHtml = `
        <input type="number" step="any" class="text-input" id="input-${idx}" 
               placeholder="Skriv tallet ditt..." onchange="saveText(${idx})">
        <p class="hint">Enhet: ${q.unit || '-'}</p>`;
    }
    
    const formulaHtml = q.formulaHint ? 
      `<div class="formula-hint">💡 Formel: ${q.formulaHint}</div>` : '';
    
    const isTheory = selectedMode === 'theory' || (q.type === 'mc' && !q.formulaHint);
    const qClass = isTheory ? 'theory' : 'math';
    
    const diffLabel = q.difficulty === 'easy' ? 'Lett' : q.difficulty === 'hard' ? 'Vanskelig' : 'Medium';

    return `
      <div class="question ${qClass}" id="q-${idx}">
        <div class="q-header">
          <span class="q-num">Spørsmål ${idx + 1}</span>
          <span class="q-cat">${q.cat}</span>
          <span class="q-weight">${q.weight} · ${q.points}p</span>
          <span class="q-difficulty ${q.difficulty}">${diffLabel}</span>
        </div>
        <div class="q-text">${q.text}</div>
        ${formulaHtml}
        ${inputHtml}
        <div class="q-actions">
          <button class="btn btn-primary" onclick="submitAnswer(${idx})">Sjekk svar</button>
          <button class="btn btn-show" onclick="showAnswer(${idx})">Vis fasit</button>
        </div>
        <div class="feedback" id="fb-${idx}"></div>
      </div>
    `;
  }).join('');
}

function showQuestion(idx) {
  document.querySelectorAll('.question').forEach(q => q.classList.remove('visible'));
  document.getElementById(`q-${idx}`).classList.add('visible');
  currentQ = idx;
  document.getElementById('current-q').textContent = idx + 1;
  document.getElementById('prev-btn').disabled = idx === 0;
  document.getElementById('next-btn').textContent = idx === currentQuestions.length - 1 ? 'Avslutt' : 'Neste →';
  updateProgress();
  window.scrollTo(0, 0);
}

function navigate(dir) {
  const newIdx = currentQ + dir;
  if (newIdx < 0) return;
  if (newIdx >= currentQuestions.length) {
    showSummary();
    return;
  }
  showQuestion(newIdx);
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const pct = (answered / currentQuestions.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('score').textContent = totalScore;
}

function selectOption(qIdx, optIdx) {
  document.querySelectorAll(`#q-${qIdx} .option`).forEach(o => o.classList.remove('selected'));
  document.getElementById(`opt-${qIdx}-${optIdx}`).classList.add('selected');
  answers[qIdx] = { selected: optIdx, type: 'mc' };
}

function saveText(qIdx) {
  const val = document.getElementById(`input-${qIdx}`).value;
  answers[qIdx] = { value: val, type: currentQuestions[qIdx].type };
}

function submitAnswer(qIdx) {
  const q = currentQuestions[qIdx];
  const ans = answers[qIdx];
  const fb = document.getElementById(`fb-${qIdx}`);
  
  if (!ans) {
    fb.className = 'feedback incorrect show';
    fb.innerHTML = '<strong>⚠️ Du må svare først.</strong>';
    return;
  }
  
  let isCorrect = false;
  
  if (q.type === 'mc') {
    isCorrect = ans.selected === q.correct;
    document.querySelectorAll(`#q-${qIdx} .option`).forEach((o, i) => {
      o.classList.remove('correct', 'incorrect');
      if (i === q.correct) o.classList.add('correct');
      else if (i === ans.selected) o.classList.add('incorrect');
    });
  } else if (q.type === 'number') {
    const userVal = parseFloat(ans.value);
    isCorrect = !isNaN(userVal) && Math.abs(userVal - q.correct) <= q.tolerance;
  }
  
  if (isCorrect) {
    if (!ans.scored) {
      totalScore += q.points;
      ans.scored = true;
    }
    fb.className = 'feedback correct show';
    fb.innerHTML = `<strong>✅ Riktig! +${q.points} poeng</strong><div style="margin-top:8px">${q.explanation}</div>`;
  } else {
    fb.className = 'feedback incorrect show';
    let correctDisplay = q.type === 'mc' ? q.options[q.correct] : `${q.correct} ${q.unit || ''}`;
    fb.innerHTML = `<strong>❌ Feil.</strong> 
      <div class="answer-key">Riktig svar: ${correctDisplay}</div>
      <div style="margin-top:8px"><strong>Forklaring:</strong> ${q.explanation}</div>`;
  }
  updateProgress();
}

function showAnswer(qIdx) {
  const q = currentQuestions[qIdx];
  const fb = document.getElementById(`fb-${qIdx}`);
  let answerText = q.type === 'mc' ? q.options[q.correct] : `${q.correct} ${q.unit || ''}`;
  fb.className = 'feedback info show';
  fb.innerHTML = `<strong>📖 Fasit:</strong>
    <div class="answer-key">${answerText}</div>
    <div style="margin-top:10px"><strong>Forklaring:</strong> ${q.explanation}</div>`;
}

function showSummary() {
  clearInterval(timerInterval);
  document.querySelectorAll('.question').forEach(q => q.classList.remove('visible'));
  document.querySelector('.nav-buttons').style.display = 'none';
  document.querySelector('.progress-container').style.display = 'none';
  document.getElementById('quiz-area').classList.remove('active');
  
  const summary = document.getElementById('summary');
  summary.classList.add('visible');
  
  const pct = Math.round((totalScore / maxPossibleScore) * 100);
  document.getElementById('final-score').textContent = pct + '%';
  
  let grade, txt;
  if (pct >= 86) { grade = 'A'; txt = 'Fremragende! Du er godt forberedt til eksamen. 🌟'; }
  else if (pct >= 75) { grade = 'B'; txt = 'Meget bra! Repeter områder du tapte poeng på. 💪'; }
  else if (pct >= 65) { grade = 'C'; txt = 'Solid prestasjon. Fokuser på de tyngste temaene fremover. 👍'; }
  else if (pct >= 49) { grade = 'D'; txt = 'Bestått. Bruk neste øktene på LP og lagerstyring spesielt.'; }
  else if (pct >= 36) { grade = 'E'; txt = 'Snauk bestått. Du må jobbe mer systematisk med LP og formlene.'; }
  else { grade = 'F'; txt = 'Ikke bestått ennå. Start med oppsummeringsforelesningen.'; }
  
  document.getElementById('final-grade').textContent = grade;
  document.getElementById('final-grade').style.color = pct >= 65 ? '#6bff9e' : pct >= 49 ? '#ffd166' : '#ff6b6b';
  document.getElementById('summary-text').textContent = txt;
  
  const elapsed = Math.floor((Date.now() - startTime) / 60000);
  document.getElementById('time-used').textContent = `⏱️ Tid brukt: ${elapsed} minutter`;
}

function restart() {
  document.getElementById('summary').classList.remove('visible');
  document.querySelector('.nav-buttons').style.display = 'flex';
  document.querySelector('.progress-container').style.display = 'block';
  startQuiz();
}

function backToMenu() {
  document.getElementById('summary').classList.remove('visible');
  document.querySelector('.nav-buttons').style.display = 'flex';
  document.querySelector('.progress-container').style.display = 'block';
  document.getElementById('start-screen').classList.remove('hidden');
  document.querySelector('.mode-selector').style.display = 'grid';
  document.getElementById('quiz-area').classList.remove('active');
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('start-info').style.display = 'none';
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('start-title').textContent = 'Velg en modus over for å starte';
  document.getElementById('start-desc').textContent = 'Hver modus tester forskjellige aspekter av faget.';
  if (timerInterval) clearInterval(timerInterval);
}
